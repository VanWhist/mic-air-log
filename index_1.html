<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MICエアlog</title>
<style>
  html, body { margin: 0; padding: 0; background: #0B1420; min-height: 100%; }
  * { box-sizing: border-box; }
  input, textarea, select, button { font-family: inherit; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

  .app-shell { min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; color: #EAF1F8; }
  .container { max-width: 480px; margin: 0 auto; padding: 32px 20px 96px; }

  .draft-banner { border-radius: 10px; padding: 10px 12px; margin-bottom: 16px; background: #2A1F0E; border: 1px solid #6B4A1E; color: #FFB870; font-size: 11px; line-height: 1.6; }

  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .app-tag { font-size: 11px; color: #5C7086; }
  .app-logo { width: 34px; height: 34px; border-radius: 50%; display: block; flex-shrink: 0; object-fit: cover; }
  .divider-svg { width: 100%; height: 16px; display: block; margin-top: 4px; }

  .tabs { display: flex; border-radius: 12px; padding: 4px; margin: 24px 0 16px; background: #131F30; border: 1px solid #26374E; }
  .tab-btn { flex: 1; padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; background: transparent; color: #8CA0B8; }
  .tab-btn.active { background: #4CC3F0; color: #062230; }

  .section { display: flex; flex-direction: column; gap: 18px; }
  .field-label { font-size: 12px; margin-bottom: 6px; display: block; color: #5C7086; }
  .sub-label { font-size: 10px; color: #5C7086; margin: 2px 0 6px; }

  .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .chip-grid.two { grid-template-columns: repeat(2, 1fr); }
  .chip-grid.four { grid-template-columns: repeat(4, 1fr); }
  .chip-btn { padding: 10px 4px; border-radius: 8px; font-size: 12px; font-weight: 600; text-align: center; line-height: 1.2; cursor: pointer; background: #1B2C42; color: #EAF1F8; border: 1px solid #26374E; }
  .chip-btn.active { background: #4CC3F0; color: #062230; border-color: #4CC3F0; }
  .chip-btn.amber.active { background: #FF9645; color: #23140A; border-color: #FF9645; }

  .select-wrap { position: relative; }
  .select-input { width: 100%; appearance: none; -webkit-appearance: none; border-radius: 8px; padding: 10px 32px 10px 12px; font-size: 14px; background: #1B2C42; border: 1px solid #26374E; color: #EAF1F8; outline: none; }
  .select-chevron { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }

  .date-input, .text-input { width: 100%; border-radius: 8px; padding: 10px 12px; font-size: 14px; background: #1B2C42; border: 1px solid #26374E; color: #EAF1F8; outline: none; color-scheme: dark; }

  .card { border-radius: 12px; padding: 14px; background: #131F30; border: 1px solid #26374E; }
  .card.raised { background: #1B2C42; }

  .tech-row-list { display: flex; flex-direction: column; gap: 10px; }
  .tech-row { border-radius: 10px; padding: 12px; background: #1B2C42; border: 1px solid #26374E; display: flex; flex-direction: column; gap: 8px; }
  .tech-row-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .tech-row-idx { font-size: 11px; color: #5C7086; font-family: ui-monospace, monospace; }
  .remove-btn { width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #131F30; color: #5C7086; border: none; cursor: pointer; flex-shrink: 0; padding: 0; }
  .code-badge { font-size: 10px; font-family: ui-monospace, monospace; color: #4CC3F0; background: #0B1420; border: 1px solid #2A5A75; border-radius: 6px; padding: 3px 6px; display: inline-block; }
  .grab-note { font-size: 9px; color: #5C7086; margin-top: 2px; }
  .inline-row { display: flex; align-items: center; gap: 8px; }
  .num-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .num-field-label { font-size: 10px; color: #5C7086; }
  .num-input { border-radius: 8px; padding: 9px 8px; font-size: 12px; font-family: ui-monospace, monospace; background: #131F30; border: 1px solid #26374E; color: #EAF1F8; outline: none; width: 100%; }

  .add-row-btn { margin-top: 2px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 8px 12px; border-radius: 8px; background: #131F30; border: 1px dashed #26374E; color: #4CC3F0; cursor: pointer; }

  .note-textarea { width: 100%; border-radius: 8px; padding: 10px 12px; font-size: 14px; background: #1B2C42; border: 1px solid #26374E; color: #EAF1F8; outline: none; resize: none; }

  .save-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 0; border-radius: 12px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; background: #4CC3F0; color: #062230; }
  .save-btn.flash { background: #3FAE6A; }

  .empty-card { border-radius: 12px; padding: 24px; text-align: center; font-size: 14px; background: #131F30; border: 1px solid #26374E; color: #5C7086; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card { border-radius: 12px; padding: 14px; background: #131F30; border: 1px solid #26374E; }
  .stat-label { font-size: 10px; color: #5C7086; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 700; font-family: ui-monospace, monospace; }
  .stat-sub { font-size: 10px; color: #5C7086; margin-top: 2px; }

  .chart-card { border-radius: 12px; padding: 16px; background: #131F30; border: 1px solid #26374E; }
  .chart-title { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-size: 12px; color: #5C7086; }
  .legend-row { display: flex; gap: 16px; margin-top: 8px; font-size: 11px; }

  .rank-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-item { display: flex; align-items: center; gap: 10px; }
  .rank-name { font-size: 12px; width: 108px; flex-shrink: 0; color: #EAF1F8; }
  .rank-bar-wrap { flex: 1; height: 10px; border-radius: 5px; background: #1B2C42; overflow: hidden; }
  .rank-bar { height: 100%; background: #4CC3F0; border-radius: 5px; }
  .rank-count { font-size: 11px; width: 44px; text-align: right; flex-shrink: 0; color: #8CA0B8; font-family: ui-monospace, monospace; }

  .recent-title { font-size: 12px; margin-bottom: 8px; color: #5C7086; }
  .recent-list { display: flex; flex-direction: column; gap: 8px; }
  .recent-item { border-radius: 8px; padding: 10px 12px; background: #131F30; border: 1px solid #26374E; }
  .recent-date { font-size: 12px; font-family: ui-monospace, monospace; color: #8CA0B8; }
  .recent-meta { font-size: 10px; color: #5C7086; margin-top: 2px; }
  .recent-techs { font-size: 13px; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 6px; }
  .recent-tech-chip { font-size: 11px; background: #1B2C42; border: 1px solid #26374E; border-radius: 6px; padding: 3px 7px; }
  .recent-note { font-size: 11px; margin-top: 4px; color: #5C7086; }

  .team-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; background: #131F30; border: 1px solid #26374E; }
  .team-row + .team-row { margin-top: 8px; }
  .team-name { font-size: 13px; font-weight: 600; }
  .team-meta { font-size: 10px; color: #5C7086; margin-top: 2px; }
  .team-count { font-size: 15px; font-family: ui-monospace, monospace; color: #4CC3F0; }
  .team-stale { color: #FF9645; }

  .chart-wrap { position: relative; width: 100%; }
  .chart-tooltip { position: absolute; top: 0; transform: translate(-50%, -100%); background: #1B2C42; border: 1px solid #26374E; border-radius: 8px; padding: 6px 8px; font-size: 11px; color: #8CA0B8; white-space: nowrap; pointer-events: none; z-index: 10; }
  .chart-tooltip .tt-date { color: #EAF1F8; margin-bottom: 2px; }

  .icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* =========================================================
   MICエアログ / プライベートチーム版。
   記録はGoogleスプレッドシート(Apps Script Web App経由)に保存され、
   同じアプリを開いている全員で共有されます。
   ========================================================= */

var COLORS = {
  ice: "#4CC3F0",
  amber: "#FF9645",
  textFaint: "#5C7086",
};

/* ---- Googleスプレッドシート連携(Apps Script Web App) ---- */
var API_URL = "https://script.google.com/macros/s/AKfycbyH7nX_nhgJ4z7W_QCLGnZqwLp8GkCdRzof2RaaR3fLK2gKVpeF8P0lATS2uzzKJhP0ag/exec";

function apiGet() {
  return fetch(API_URL).then(function (res) { return res.json(); });
}
function apiPost(payload) {
  return fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  }).then(function (res) { return res.json(); });
}
function refreshData() {
  return apiGet().then(function (data) {
    ATHLETES = (data.athletes || []).map(function (a) { return { id: a.id, name: a.name }; });
    DATA = data.records || [];
    recentAthleteIds = computeRecentAthleteIds();
  });
}

/* 選手データはGoogleスプレッドシートから読み込む(初期状態は空、refreshData()で読み込まれる)。 */
var ATHLETES = [];
function hasAthletes() { return ATHLETES.length > 0; }
function athleteName(id) {
  var a = ATHLETES.filter(function (x) { return x.id === id; })[0];
  return a ? a.name : id;
}

var FACILITIES = [
  { name: "WJM", kickers: ["手前", "奥"] },
  { name: "O-air", kickers: ["9番台", "その他"] },
  { name: "S-air", kickers: ["モーグル台", "その他"] },
  { name: "K-air", kickers: ["モーグル台", "その他"] },
  { name: "さのさか", kickers: ["7番台", "6番台", "その他"] },
  { name: "テイネ", kickers: ["モーグル台", "その他"] },
];
function kickersForFacility(name) {
  var f = FACILITIES.filter(function (x) { return x.name === name; })[0];
  return f ? f.kickers : [];
}

var TRICKS = [
  { group: "ストレートジャンプ", items: [
    { id: "straight_jump", label: "ストレートジャンプ", code: null },
  ]},
  { group: "回転系", items: [
    { id: "rot_3", label: "360", code: "3" },
    { id: "rot_7", label: "720", code: "7" },
    { id: "rot_10", label: "1080", code: "10" },
  ]},
  { group: "オフアクシス", items: [
    { id: "oax_3", label: "オフアクシス360", code: "3o" },
    { id: "oax_7", label: "オフアクシス720", code: "7o" },
    { id: "oax_10", label: "オフアクシス1080", code: "10o" },
    { id: "oax_14", label: "オフアクシス1440", code: "14o" },
  ]},
  { group: "宙返り系", items: [
    { id: "inv_bpt", label: "バックタック/パイク", code: "bP/bT" },
    { id: "inv_bl", label: "バックレイアウト", code: "bL" },
    { id: "inv_bf", label: "バックフル", code: "bF" },
    { id: "inv_bdf", label: "バックダブルフル", code: "bdF" },
    { id: "inv_btf", label: "バックトリプルフル", code: "btF" },
    { id: "inv_fpt", label: "フロントタック/パイク", code: "fT/fP" },
    { id: "inv_ff", label: "フロントフル", code: "fF" },
  ]},
  { group: "ループ", items: [
    { id: "loop_l", label: "ループ", code: "l" },
  ]},
];
var TRICK_INDEX = {};
TRICKS.forEach(function (g) { g.items.forEach(function (t) { TRICK_INDEX[t.id] = t; }); });

function trickLabel(id) {
  var t = TRICK_INDEX[id];
  return t ? t.label : id;
}
var MODIFIERS = [
  { id: "none", label: "グラブ・ポジションなし" },
  { id: "position", label: "ポジション" },
  { id: "G", label: "G" },
  { id: "g", label: "g" },
];
function modifierLabel(id) {
  var m = MODIFIERS.filter(function (x) { return x.id === id; })[0];
  return m ? m.label : id;
}
function composedCode(id, modifier) {
  var t = TRICK_INDEX[id];
  if (!t || !t.code) return null;
  var c = t.code;
  if (modifier === "position") c += "p";
  if (modifier === "G") c += "G";
  if (modifier === "g") c += "g";
  return c;
}

function todayStr() { return new Date().toISOString().slice(0, 10); }
function escHtml(str) { return String(str == null ? "" : str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function escAttr(str) { return escHtml(str).replace(/"/g, "&quot;"); }

function iconSvg(inner, size, color, extraClass) {
  return '<svg class="icon ' + (extraClass || "") + '" viewBox="0 0 24 24" width="' + size + '" height="' + size + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + inner + "</svg>";
}
function iconPlus(size, color) { return iconSvg('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>', size, color); }
function iconMinus(size, color) { return iconSvg('<line x1="5" y1="12" x2="19" y2="12"/>', size, color); }
function iconChevronDown(size, color) { return iconSvg('<polyline points="6 9 12 15 18 9"/>', size, color); }
function iconTrendingUp(size, color) { return iconSvg('<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>', size, color); }
function iconSave(size, color) { return iconSvg('<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>', size, color); }
function iconUsers(size, color) { return iconSvg('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>', size, color); }

function mogulDividerSvg() {
  return '<svg class="divider-svg" viewBox="0 0 400 20" preserveAspectRatio="none"><polyline points="0,16 25,4 50,16 75,4 100,16 125,4 150,16 175,4 200,16 225,4 250,16 275,4 300,16 325,4 350,16 375,4 400,16" fill="none" stroke="' + COLORS.ice + '" stroke-width="1.5" opacity="0.5"/></svg>';
}

/* プライベートチーム版:サンプルの記録データはなし(選手を追加してから記録を始める)。 */
function seedRow(trickId, modifier, success, fail, nuki, unnatural) {
  return { trickId: trickId, modifier: modifier || "none", nuki: !!nuki, unnatural: !!unnatural, success: success, fail: fail || 0 };
}
function seedRepRow(trickId, modifier, reps, nuki, unnatural) {
  return { trickId: trickId, modifier: modifier || "none", nuki: !!nuki, unnatural: !!unnatural, reps: reps };
}
var DATA = [];
var seedCounter = DATA.length;

/* ---- recently-used athlete ordering ---- */
function computeRecentAthleteIds() {
  var lastSeen = {};
  DATA.forEach(function (e) {
    if (!lastSeen[e.athlete] || e.date > lastSeen[e.athlete]) lastSeen[e.athlete] = e.date;
  });
  return Object.keys(lastSeen).sort(function (a, b) { return lastSeen[b].localeCompare(lastSeen[a]); });
}
var recentAthleteIds = [];
function touchRecentAthlete(id) {
  recentAthleteIds = [id].concat(recentAthleteIds.filter(function (x) { return x !== id; }));
}
function getOrderedAthletes() {
  var used = recentAthleteIds.map(function (id) { return ATHLETES.filter(function (a) { return a.id === id; })[0]; }).filter(Boolean);
  var rest = ATHLETES.filter(function (a) { return recentAthleteIds.indexOf(a.id) === -1; });
  return used.concat(rest);
}

/* ---- 選手を追加(名前を入力してリストに増やしていく) ---- */
function toggleAddAthlete(context) {
  S.addingAthlete = (S.addingAthlete === context) ? null : context;
  S.newAthleteName = "";
  S.addAthleteError = "";
  render();
}
function setNewAthleteName(v) { S.newAthleteName = v; }
function addAthlete(context) {
  var name = (S.newAthleteName || "").trim();
  if (!name) return;
  S.addingAthleteBusy = true;
  S.addAthleteError = "";
  render();
  apiPost({ type: "addAthlete", name: name }).then(function (result) {
    if (result.status !== "ok") { throw new Error(result.message || "登録に失敗しました"); }
    return refreshData().then(function () {
      var id = result.athlete.id;
      touchRecentAthlete(id);
      if (context === "record") { S.athlete = id; }
      else { S.dashAthlete = id; }
      S.addingAthlete = null;
      S.newAthleteName = "";
      S.addingAthleteBusy = false;
      render();
    });
  }).catch(function (err) {
    S.addingAthleteBusy = false;
    S.addAthleteError = "選手の登録に失敗しました。通信状況を確認してもう一度お試しください。";
    render();
  });
}
function handleNewAthleteKeydown(e, context) {
  if (e.key === "Enter") { e.preventDefault(); addAthlete(context); }
}
function renderAddAthleteForm(context) {
  var open = S.addingAthlete === context;
  if (!open) {
    return '<button class="add-row-btn" style="margin-top:8px;" onclick="toggleAddAthlete(\'' + context + '\')">' + iconPlus(14, COLORS.ice) + " 選手を追加</button>";
  }
  var busy = S.addingAthleteBusy;
  return (
    '<div class="inline-row" style="margin-top:8px;">' +
    '<input class="text-input" type="text" placeholder="選手名を入力" value="' + escAttr(S.newAthleteName) + '" oninput="setNewAthleteName(this.value)" onkeydown="handleNewAthleteKeydown(event,\'' + context + '\')" style="flex:1;" ' + (busy ? "disabled" : "") + '>' +
    '<button class="save-btn" style="width:auto;padding:10px 14px;flex-shrink:0;" onclick="addAthlete(\'' + context + '\')" ' + (busy ? "disabled" : "") + '>' + (busy ? "追加中…" : "追加") + '</button>' +
    '<button class="chip-btn" style="flex:0 0 auto;padding:10px 12px;" onclick="toggleAddAthlete(\'' + context + '\')" ' + (busy ? "disabled" : "") + '>キャンセル</button>' +
    "</div>" +
    (S.addAthleteError ? '<div style="color:' + COLORS.amber + ';font-size:11px;margin-top:6px;">' + escHtml(S.addAthleteError) + "</div>" : "")
  );
}

/* ---- app state ---- */
function emptyTechRow(category) {
  if (category === "trampoline") return { trickId: "rot_3", modifier: "none", nuki: false, unnatural: false, reps: "" };
  return { trickId: "rot_3", modifier: "none", nuki: false, unnatural: false, success: "", fail: "" };
}
var S = {
  tab: "record",
  athlete: "",
  category: "water",
  date: todayStr(),
  facility: FACILITIES[0].name,
  kicker: FACILITIES[0].kickers[0],
  rows: [emptyTechRow("water")],
  note: "",
  saving: false,
  savedFlash: false,
  dashAthlete: "team",
  dashCategory: "water",
  editingEntryId: null,
  editDraft: null,
  confirmDeleteId: null,
  addingAthlete: null,
  newAthleteName: "",
  saveError: "",
  editSaving: false,
  editError: "",
  deleteBusy: false,
  deleteError: "",
  addingAthleteBusy: false,
  addAthleteError: "",
  loading: true,
  loadError: "",
};
var pendingCharts = [];

function selectTab(tab) { S.tab = tab; if (tab !== "dashboard") { S.editingEntryId = null; S.editDraft = null; S.confirmDeleteId = null; } render(); }
function selectAthlete(id) { S.athlete = id; touchRecentAthlete(id); render(); }
function selectCategory(cat) {
  S.category = cat;
  S.rows = [emptyTechRow(cat)];
  render();
}
function setDate(v) { S.date = v; }
function selectFacility(v) {
  S.facility = v;
  var kickers = kickersForFacility(v);
  S.kicker = kickers[0] || "";
  render();
}
function selectKicker(k) { S.kicker = k; render(); }
function setNote(v) { S.note = v; }
function addTechRow() { S.rows.push(emptyTechRow(S.category)); render(); }
function removeTechRow(idx) {
  if (S.rows.length > 1) { S.rows = S.rows.filter(function (_, i) { return i !== idx; }); render(); }
}
function setRowTrick(idx, v) { S.rows[idx].trickId = v; render(); }
function setRowModifier(idx, m) { S.rows[idx].modifier = m; render(); }
function toggleRowNuki(idx) { S.rows[idx].nuki = !S.rows[idx].nuki; render(); }
function toggleRowUnnatural(idx) { S.rows[idx].unnatural = !S.rows[idx].unnatural; render(); }
function setRowField(idx, field, v) { S.rows[idx][field] = v; }

function saveEntry() {
  if (!S.athlete) return;
  var validRows;
  if (S.category === "trampoline") {
    validRows = S.rows.filter(function (r) { return r.reps !== "" && Number(r.reps) >= 0; }).map(function (r) {
      return { trickId: r.trickId, trickLabel: trickLabel(r.trickId), modifier: r.modifier, nuki: !!r.nuki, unnatural: !!r.unnatural, reps: Number(r.reps) || 0 };
    });
  } else {
    validRows = S.rows.filter(function (r) { return r.success !== "" && Number(r.success) >= 0; }).map(function (r) {
      return { trickId: r.trickId, trickLabel: trickLabel(r.trickId), modifier: r.modifier, nuki: !!r.nuki, unnatural: !!r.unnatural, success: Number(r.success) || 0, fail: Number(r.fail) || 0 };
    });
  }
  if (validRows.length === 0) return;
  S.saving = true;
  S.saveError = "";
  render();
  // 同じ選手・種類・日付の記録がすでにあれば、サーバー側で既存の記録にまとめられる(合算)。
  var payload = {
    type: "saveEntry",
    athlete: S.athlete,
    athleteName: athleteName(S.athlete),
    category: S.category,
    date: S.date,
    note: S.note.trim(),
    rows: validRows,
  };
  if (S.category === "water") { payload.facility = S.facility; payload.kicker = S.kicker; }
  apiPost(payload).then(function (result) {
    if (result.status !== "ok") { throw new Error(result.message || "保存に失敗しました"); }
    return refreshData();
  }).then(function () {
    touchRecentAthlete(S.athlete);
    S.saving = false;
    S.rows = [emptyTechRow(S.category)];
    S.note = "";
    S.savedFlash = true;
    render();
    setTimeout(function () { S.savedFlash = false; render(); }, 1600);
  }).catch(function (err) {
    S.saving = false;
    S.saveError = "保存に失敗しました。通信状況を確認してもう一度お試しください。";
    render();
  });
}

function getEntries(athleteId, category) {
  return DATA.filter(function (e) { return e.athlete === athleteId && e.category === category; })
    .slice().sort(function (a, b) { return a.date.localeCompare(b.date); });
}
function rowTotal(r) { return r.reps !== undefined ? Number(r.reps) || 0 : (Number(r.success) || 0) + (Number(r.fail) || 0); }
function rowSuccess(r) { return r.reps !== undefined ? null : Number(r.success) || 0; }
function entryTotal(entry) {
  return entry.rows.reduce(function (sum, r) { return sum + rowTotal(r); }, 0);
}
function entrySuccess(entry) {
  return entry.rows.reduce(function (sum, r) { var s = rowSuccess(r); return sum + (s === null ? 0 : s); }, 0);
}
function trickTotals(entries) {
  var map = {};
  entries.forEach(function (e) {
    e.rows.forEach(function (r) {
      var key = trickLabel(r.trickId) + (r.nuki ? "（抜き）" : "") + (r.unnatural ? "（アンナチュラル）" : "");
      if (!map[key]) map[key] = { count: 0, success: 0 };
      map[key].count += rowTotal(r);
      var s = rowSuccess(r);
      if (s !== null) map[key].success += s;
    });
  });
  return Object.keys(map).map(function (k) { return { name: k, count: map[k].count, success: map[k].success }; }).sort(function (a, b) { return b.count - a.count; });
}
function daysByCategory(athleteId) {
  var water = getEntries(athleteId, "water");
  var trampoline = getEntries(athleteId, "trampoline");
  return {
    water: new Set(water.map(function (e) { return e.date; })).size,
    trampoline: new Set(trampoline.map(function (e) { return e.date; })).size,
  };
}

function computeChartGeom(data, series, width, height, m) {
  var n = data.length;
  var plotW = width - m.left - m.right;
  var plotH = height - m.top - m.bottom;
  var values = [];
  data.forEach(function (d) { series.forEach(function (s) { var v = d[s.key]; if (v !== null && v !== undefined && !Number.isNaN(v)) values.push(v); }); });
  var maxV = values.length ? Math.max.apply(null, values) : 1;
  var minV = values.length ? Math.min(0, Math.min.apply(null, values)) : 0;
  var range = maxV - minV || 1;
  function xAt(i) { return n <= 1 ? m.left + plotW / 2 : m.left + (i / (n - 1)) * plotW; }
  function yAt(v) { return m.top + plotH - ((v - minV) / range) * plotH; }
  return { xAt: xAt, yAt: yAt, maxV: maxV, minV: minV, n: n, plotW: plotW, plotH: plotH };
}
function renderChartHtml(id, data, series, height) {
  var width = 400;
  var m = { top: 10, bottom: 20, left: 30, right: 8 };
  var geom = computeChartGeom(data, series, width, height, m);
  var n = data.length;
  var svg = '<svg viewBox="0 0 ' + width + " " + height + '" width="100%" height="' + height + '" preserveAspectRatio="none" style="display:block;overflow:visible;">';
  svg += '<line x1="' + m.left + '" y1="' + (m.top + geom.plotH) + '" x2="' + (m.left + geom.plotW) + '" y2="' + (m.top + geom.plotH) + '" stroke="#26374E" stroke-width="1"/>';
  svg += '<text x="' + (m.left - 4) + '" y="' + (geom.yAt(geom.maxV) + 3) + '" text-anchor="end" font-size="9" fill="' + COLORS.textFaint + '">' + Math.round(geom.maxV * 10) / 10 + "</text>";
  svg += '<text x="' + (m.left - 4) + '" y="' + (geom.yAt(geom.minV) + 3) + '" text-anchor="end" font-size="9" fill="' + COLORS.textFaint + '">' + Math.round(geom.minV * 10) / 10 + "</text>";
  var mid = Math.floor((n - 1) / 2);
  data.forEach(function (pt, i) {
    if (i !== 0 && i !== mid && i !== n - 1) return;
    svg += '<text x="' + geom.xAt(i) + '" y="' + (height - 5) + '" text-anchor="middle" font-size="9" fill="' + COLORS.textFaint + '">' + escHtml(String(pt.date).slice(5)) + "</text>";
  });
  series.forEach(function (s) {
    var d = "", started = false;
    data.forEach(function (pt, i) {
      var v = pt[s.key];
      if (v === null || v === undefined || Number.isNaN(v)) { started = false; return; }
      var x = geom.xAt(i), y = geom.yAt(v);
      d += (started ? "L" : "M") + x.toFixed(1) + "," + y.toFixed(1) + " ";
      started = true;
    });
    svg += '<path d="' + d.trim() + '" fill="none" stroke="' + s.color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  });
  series.forEach(function (s) {
    data.forEach(function (pt, i) {
      var v = pt[s.key];
      if (v === null || v === undefined || Number.isNaN(v)) return;
      svg += '<circle cx="' + geom.xAt(i) + '" cy="' + geom.yAt(v) + '" r="3" fill="' + s.color + '" stroke="#0B1420" stroke-width="1.5"/>';
    });
  });
  var slotW = geom.plotW / Math.max(n, 1);
  data.forEach(function (pt, i) {
    svg += '<rect class="hit" data-idx="' + i + '" x="' + (geom.xAt(i) - slotW / 2).toFixed(1) + '" y="' + m.top + '" width="' + slotW.toFixed(1) + '" height="' + geom.plotH + '" fill="transparent"/>';
  });
  svg += "</svg>";
  pendingCharts.push({ id: id, data: data, series: series, geom: geom });
  return '<div class="chart-wrap" id="' + id + '">' + svg + '<div class="chart-tooltip" style="display:none;"></div></div>';
}
function wireCharts() {
  pendingCharts.forEach(function (chart) {
    var root = document.getElementById(chart.id);
    if (!root) return;
    var tooltip = root.querySelector(".chart-tooltip");
    root.querySelectorAll("rect.hit").forEach(function (rect) {
      var idx = Number(rect.getAttribute("data-idx"));
      rect.addEventListener("mouseenter", function () {
        var pt = chart.data[idx];
        var x = chart.geom.xAt(idx);
        tooltip.style.left = (x / 400) * 100 + "%";
        tooltip.style.display = "block";
        var html = '<div class="tt-date">' + escHtml(pt.date) + "</div>";
        chart.series.forEach(function (s) {
          var v = pt[s.key];
          if (v === null || v === undefined) return;
          html += '<div style="color:' + s.color + '">' + (s.name ? escHtml(s.name) + ": " : "") + escHtml(v) + (s.unit || "") + "</div>";
        });
        tooltip.innerHTML = html;
      });
      rect.addEventListener("mouseleave", function () { tooltip.style.display = "none"; });
    });
  });
}

/* ---- 施設・台別の技別本数(ウォータージャンプのみ) ---- */
function facilityKickerBreakdown(entries) {
  var order = [];
  var map = {};
  entries.forEach(function (e) {
    if (!e.facility) return;
    if (!map[e.facility]) { map[e.facility] = {}; order.push(e.facility); }
    if (!map[e.facility][e.kicker]) map[e.facility][e.kicker] = {};
    var kMap = map[e.facility][e.kicker];
    e.rows.forEach(function (r) {
      var key = trickLabel(r.trickId) + (r.nuki ? "（抜き）" : "") + (r.unnatural ? "（アンナチュラル）" : "");
      kMap[key] = (kMap[key] || 0) + rowTotal(r);
    });
  });
  return { order: order, map: map };
}
function sumTrickCounts(tricks) {
  return Object.keys(tricks).reduce(function (sum, k) { return sum + tricks[k]; }, 0);
}
function renderFacilityBreakdown(entries) {
  var b = facilityKickerBreakdown(entries);
  if (b.order.length === 0) return "";
  var grandTotal = 0;
  var facilitiesHtml = b.order.map(function (fname) {
    var kickers = b.map[fname];
    var canonical = kickersForFacility(fname);
    var kickerOrder = Object.keys(kickers).sort(function (a, c) {
      var ia = canonical.indexOf(a); if (ia === -1) ia = 999;
      var ic = canonical.indexOf(c); if (ic === -1) ic = 999;
      return ia - ic;
    });
    var facilityTotal = 0;
    var kickersHtml = kickerOrder.map(function (kname) {
      var tricks = kickers[kname];
      var kickerTotal = sumTrickCounts(tricks);
      facilityTotal += kickerTotal;
      var trickKeys = Object.keys(tricks).sort(function (a, c) { return tricks[c] - tricks[a]; });
      var chips = trickKeys.map(function (tk) {
        return '<span class="recent-tech-chip">' + escHtml(tk) + " " + tricks[tk] + "本</span>";
      }).join("");
      return '<div style="margin-top:8px;"><div style="font-size:11px;color:' + COLORS.textFaint + ';margin-bottom:4px;display:flex;justify-content:space-between;"><span>' + escHtml(kname) + '</span><span style="color:' + COLORS.ice + ';font-family:ui-monospace,monospace;">' + kickerTotal + '本</span></div><div class="recent-techs">' + chips + "</div></div>";
    }).join("");
    grandTotal += facilityTotal;
    return '<div style="margin-bottom:14px;"><div style="font-size:13px;font-weight:600;display:flex;justify-content:space-between;"><span>' + escHtml(fname) + '</span><span style="color:' + COLORS.ice + ';font-family:ui-monospace,monospace;">累計 ' + facilityTotal + '本</span></div>' + kickersHtml + "</div>";
  }).join("");
  return '<div class="card"><div class="recent-title" style="display:flex;justify-content:space-between;"><span>施設・台別 技別本数</span><span>総本数 ' + grandTotal + "本</span></div>" + facilitiesHtml + "</div>";
}

function renderTeamDashboard() {

    return '<div class="empty-card">まだ選手が登録されていません。「選手」欄から名前を追加してください。</div>';
  }
  var rows = ATHLETES.map(function (a) {
    var entries = getEntries(a.id, S.dashCategory);
    var total = entries.reduce(function (s, e) { return s + entryTotal(e); }, 0);
    var last = entries.length ? entries[entries.length - 1].date : null;
    var stale = last ? (new Date(todayStr()) - new Date(last)) / 86400000 > 10 : true;
    return { name: a.name, total: total, last: last, stale: stale };
  });
  rows.sort(function (a, b) { return b.total - a.total; });
  var body = rows.map(function (r) {
    return (
      '<div class="team-row"><div><div class="team-name">' + escHtml(r.name) + "</div>" +
      '<div class="team-meta ' + (r.stale ? "team-stale" : "") + '">直近の練習: ' + (r.last ? escHtml(r.last) : "記録なし") + "</div></div>" +
      '<div class="team-count">' + r.total + "本</div></div>"
    );
  }).join("");
  return (
    '<div class="card raised" style="margin-bottom:4px;"><div class="recent-title" style="margin-bottom:10px;">選手ごとの累計本数(' + (S.dashCategory === "water" ? "ウォータージャンプ" : "トランポリン") + ")</div>" + body + "</div>"
  );
}

function renderDashboardTab() {
  var athleteSelect =
    '<div class="select-wrap"><select class="select-input" onchange="setDashAthlete(this.value)">' +
    '<option value="team" ' + (S.dashAthlete === "team" ? "selected" : "") + ">チーム全体(全選手)</option>" +
    renderAthleteOptions(S.dashAthlete === "team" ? null : S.dashAthlete) +
    "</select><span class=\"select-chevron\">" + iconChevronDown(16, COLORS.textFaint) + "</span></div>";
  var categoryChips =
    '<button class="chip-btn ' + (S.dashCategory === "water" ? "active" : "") + '" onclick="setDashCategory(\'water\')">ウォータージャンプ</button>' +
    '<button class="chip-btn ' + (S.dashCategory === "trampoline" ? "active" : "") + '" onclick="setDashCategory(\'trampoline\')">トランポリン</button>';
  var body = S.dashAthlete === "team" ? renderTeamDashboard() : renderAthleteDashboard();
  return (
    '<div class="section">' +
    '<div><label class="field-label">表示対象</label>' + athleteSelect + renderAddAthleteForm("dashboard") + "</div>" +
    '<div><label class="field-label">種類</label><div class="chip-grid two">' + categoryChips + "</div></div>" +
    body +
    "</div>"

}
function setDashAthlete(id) { S.dashAthlete = id; if (id !== "team") touchRecentAthlete(id); S.editingEntryId = null; S.editDraft = null; S.confirmDeleteId = null; render(); }
function setDashCategory(c) { S.dashCategory = c; S.editingEntryId = null; S.editDraft = null; S.confirmDeleteId = null; render(); }

/* ---- ダッシュボードからの記録修正・削除 ---- */
function startEditEntry(entryId) {
  var e = DATA.filter(function (x) { return x.id === entryId; })[0];
  if (!e) return;
  S.editingEntryId = entryId;
  S.editDraft = {
    date: e.date,
    facility: e.facility || FACILITIES[0].name,
    kicker: e.kicker || (kickersForFacility(e.facility || FACILITIES[0].name)[0] || ""),
    note: e.note || "",
    rows: e.rows.map(function (r) {
      return {
        trickId: r.trickId,
        modifier: r.modifier,
        nuki: !!r.nuki,
        unnatural: !!r.unnatural,
        success: r.success,
        fail: r.fail,
        reps: r.reps,
      };
    }),
  };
  S.confirmDeleteId = null;
  render();
}
function cancelEditEntry() { S.editingEntryId = null; S.editDraft = null; S.editError = ""; render(); }
function setEditDate(v) { S.editDraft.date = v; }
function setEditFacility(v) {
  S.editDraft.facility = v;
  var kickers = kickersForFacility(v);
  S.editDraft.kicker = kickers[0] || "";
  render();
}
function setEditKicker(k) { S.editDraft.kicker = k; render(); }
function setEditNote(v) { S.editDraft.note = v; }
function addEditRow(category) { S.editDraft.rows.push(emptyTechRow(category)); render(); }
function removeEditRow(idx) {
  if (S.editDraft.rows.length > 1) { S.editDraft.rows = S.editDraft.rows.filter(function (_, i) { return i !== idx; }); render(); }
}
function setEditRowTrick(idx, v) { S.editDraft.rows[idx].trickId = v; render(); }
function setEditRowModifier(idx, m) { S.editDraft.rows[idx].modifier = m; render(); }
function toggleEditRowNuki(idx) { S.editDraft.rows[idx].nuki = !S.editDraft.rows[idx].nuki; render(); }
function toggleEditRowUnnatural(idx) { S.editDraft.rows[idx].unnatural = !S.editDraft.rows[idx].unnatural; render(); }
function setEditRowField(idx, field, v) { S.editDraft.rows[idx][field] = v; }

function saveEditEntry(category) {
  var entry = DATA.filter(function (x) { return x.id === S.editingEntryId; })[0];
  if (!entry) return;
  var validRows;
  if (category === "trampoline") {
    validRows = S.editDraft.rows.filter(function (r) { return r.reps !== "" && r.reps !== undefined && Number(r.reps) >= 0; }).map(function (r) {
      return { trickId: r.trickId, trickLabel: trickLabel(r.trickId), modifier: r.modifier, nuki: !!r.nuki, unnatural: !!r.unnatural, reps: Number(r.reps) || 0 };
    });
  } else {
    validRows = S.editDraft.rows.filter(function (r) { return r.success !== "" && r.success !== undefined && Number(r.success) >= 0; }).map(function (r) {
      return { trickId: r.trickId, trickLabel: trickLabel(r.trickId), modifier: r.modifier, nuki: !!r.nuki, unnatural: !!r.unnatural, success: Number(r.success) || 0, fail: Number(r.fail) || 0 };
    });
  }
  if (validRows.length === 0) return;
  S.editSaving = true;
  S.editError = "";
  render();
  var payload = {
    type: "updateEntry",
    entryId: entry.id,
    athlete: entry.athlete,
    athleteName: entry.athleteName || athleteName(entry.athlete),
    category: category,
    date: S.editDraft.date,
    note: S.editDraft.note.trim(),
    rows: validRows,
  };
  if (category === "water") { payload.facility = S.editDraft.facility; payload.kicker = S.editDraft.kicker; }
  apiPost(payload).then(function (result) {
    if (result.status !== "ok") { throw new Error(result.message || "更新に失敗しました"); }
    return refreshData();
  }).then(function () {
    S.editingEntryId = null;
    S.editDraft = null;
    S.editSaving = false;
    render();
  }).catch(function (err) {
    S.editSaving = false;
    S.editError = "保存に失敗しました。通信状況を確認してもう一度お試しください。";
    render();
  });
}
function requestDeleteEntry(id) { S.confirmDeleteId = id; S.deleteError = ""; render(); }
function cancelDeleteEntry() { S.confirmDeleteId = null; S.deleteError = ""; render(); }
function confirmDeleteEntry(id) {
  S.deleteBusy = true;
  S.deleteError = "";
  render();
  apiPost({ type: "deleteEntry", entryId: id }).then(function (result) {
    if (result.status !== "ok") { throw new Error(result.message || "削除に失敗しました"); }
    return refreshData();
  }).then(function () {
    if (S.editingEntryId === id) S.editingEntryId = null;
    S.editDraft = null;
    S.confirmDeleteId = null;
    S.deleteBusy = false;
    render();
  }).catch(function (err) {
    S.deleteBusy = false;
    S.deleteError = "削除に失敗しました。通信状況を確認してもう一度お試しください。";
    render();
  });
}

function renderEditTechRow(row, idx, category) {
  var code = composedCode(row.trickId, row.modifier);
  var countFields = category === "trampoline"
    ? '<div class="num-field"><span class="num-field-label">本数</span><input class="num-input" type="number" inputmode="numeric" placeholder="0" value="' + escAttr(row.reps) + '" oninput="setEditRowField(' + idx + ",'reps',this.value)\"></div>"
    : '<div class="num-field"><span class="num-field-label">成功本数</span><input class="num-input" type="number" inputmode="numeric" placeholder="0" value="' + escAttr(row.success) + '" oninput="setEditRowField(' + idx + ",'success',this.value)\"></div>" +
      '<div class="num-field"><span class="num-field-label">失敗本数</span><input class="num-input" type="number" inputmode="numeric" placeholder="0" value="' + escAttr(row.fail) + '" oninput="setEditRowField(' + idx + ",'fail',this.value)\"></div>";
  var modifierChips = MODIFIERS.map(function (m) {
    var isGrabLetter = m.id === "G" || m.id === "g";
    return '<button class="chip-btn ' + (isGrabLetter ? "amber " : "") + (row.modifier === m.id ? "active" : "") + '" style="flex:1;font-size:10px;padding:8px 3px;" onclick="setEditRowModifier(' + idx + ",'" + m.id + "')\">" + escHtml(m.label) + "</button>";
  }).join("");
  var nukiChip = '<button class="chip-btn ' + (row.nuki ? "active" : "") + '" style="flex:1;font-size:10px;padding:8px 3px;" onclick="toggleEditRowNuki(' + idx + ')">抜き</button>';
  var unnaturalChip = '<button class="chip-btn ' + (row.unnatural ? "active" : "") + '" style="flex:1;font-size:10px;padding:8px 3px;" onclick="toggleEditRowUnnatural(' + idx + ')">アンナチュラル</button>';
  var optgroups = TRICKS.map(function (g) {
    var opts = g.items.map(function (t) {
      return '<option value="' + t.id + '" ' + (row.trickId === t.id ? "selected" : "") + ">" + escHtml(t.label) + (t.code ? " (" + t.code + ")" : "") + "</option>";
    }).join("");
    return '<optgroup label="' + escAttr(g.group) + '">' + opts + "</optgroup>";
  }).join("");
  var trickSelect = '<div class="select-wrap"><select class="select-input" onchange="setEditRowTrick(' + idx + ',this.value)">' + optgroups + "</select>" +
    '<span class="select-chevron">' + iconChevronDown(16, COLORS.textFaint) + "</span></div>";
  return (
    '<div class="tech-row">' +
    '<div class="tech-row-top"><span class="tech-row-idx">技 ' + (idx + 1) + "</span>" +
    (code ? '<span class="code-badge">' + escHtml(code) + "</span>" : "") +
    (row.nuki ? '<span class="code-badge" style="color:' + COLORS.amber + ';border-color:' + COLORS.amber + ';">抜き</span>' : "") +
    (row.unnatural ? '<span class="code-badge" style="color:' + COLORS.ice + ';border-color:' + COLORS.ice + ';">アンナチュラル</span>' : "") +
    '<button class="remove-btn" onclick="removeEditRow(' + idx + ')" style="margin-left:auto;">' + iconMinus(14, COLORS.textFaint) + "</button>" +
    "</div>" +
    trickSelect +
    '<div class="inline-row">' + modifierChips + "</div>" +
    '<div class="inline-row">' + nukiChip + unnaturalChip + "</div>" +
    '<div class="inline-row">' + countFields + "</div>" +
    "</div>"
  );
}

function renderEntryEditForm(entry) {
  var category = entry.category;
  var isWater = category === "water";
  var facilityOptions = FACILITIES.map(function (f) {
    return '<option value="' + escAttr(f.name) + '" ' + (S.editDraft.facility === f.name ? "selected" : "") + ">" + escHtml(f.name) + "</option>";
  }).join("");
  var kickerChips = kickersForFacility(S.editDraft.facility).map(function (k) {
    return '<button class="chip-btn ' + (S.editDraft.kicker === k ? "active" : "") + '" onclick="setEditKicker(\'' + k + "')\">" + k + "</button>";
  }).join("");
  var rowsHtml = S.editDraft.rows.map(function (r, i) { return renderEditTechRow(r, i, category); }).join("");
  var confirmingDelete = S.confirmDeleteId === entry.id;
  return (
    '<div class="card raised" style="margin-top:8px;display:flex;flex-direction:column;gap:10px;">' +

    '<div><label class="field-label">メモ</label><textarea class="note-textarea" rows="2" oninput="setEditNote(this.value)">' + escHtml(S.editDraft.note) + "</textarea></div>" +

    '<button class="chip-btn" style="flex:0 0 auto;padding:12px 14px;" onclick="cancelEditEntry()" ' + (S.editSaving ? "disabled" : "") + '>キャンセル</button>' +
    "</div>" +

      : '<button class="add-row-btn" style="border-color:' + COLORS.amber + ';color:' + COLORS.amber + ';justify-content:center;" onclick="requestDeleteEntry(\'' + entry.id + '\')">' + iconMinus(14, COLORS.amber) + " この記録を削除</button>"
    ) +
    "</div>"
  );
}

function renderTabs() {
  return (
    '<div class="tabs">' +
    '<button class="tab-btn ' + (S.tab === "record" ? "active" : "") + '" onclick="selectTab(\'record\')">記録する</button>' +
    '<button class="tab-btn ' + (S.tab === "dashboard" ? "active" : "") + '" onclick="selectTab(\'dashboard\')">ダッシュボード</button>' +
    "</div>"
  );
}
function render() {
  pendingCharts = [];
  var root = document.getElementById("root");
  root.innerHTML =
    '<div class="app-shell"><div class="container">' +
    renderHeader() +
    renderTabs() +
    (S.tab === "record" ? renderRecordTab() : renderDashboardTab()) +
    "</div></div>";
  wireCharts();
}
function renderLoading() {
  var root = document.getElementById("root");
  root.innerHTML =
    '<div class="app-shell"><div class="container">' +
    renderHeader() +
    '<div class="section" style="text-align:center;padding:40px 12px;color:' + COLORS.textFaint + ';">読み込み中…</div>' +
    "</div></div>";
}
function loadAll() {
  S.loading = true;
  renderLoading();
  refreshData().then(function () {
    S.loading = false;
    S.loadError = "";
    render();
  }).catch(function (err) {
    S.loading = false;
    S.loadError = "データの読み込みに失敗しました。通信状況を確認して、画面を再読み込みしてください。";
    render();
  });
}

loadAll();
