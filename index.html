<style>
html, body { margin: 0; padding: 0; background: #0B1420; min-height: 100%; }
* { box-sizing: border-box; }
input, textarea, select, button { font-family: inherit; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

.app-shell { min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; color: #EAF1F8; }
.container { max-width: 480px; margin: 0 auto; padding: 32px 20px 96px; }

.draft-banner { border-radius: 10px; padding: 10px 12px; margin-bottom: 16px; background: #2A1F0E; border: 1px solid #6B4A1E; color: #FFB870; font-size: 11px; line-height: 1.6; }

.header-row { display: flex; align-items: center; justify-content: space-between; }
.refresh-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #6B4A1E; background: transparent; color: #FFB870; font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.refresh-btn:disabled { opacity: 0.6; cursor: default; }
@keyframes micSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.refresh-btn.spinning { animation: micSpin 0.8s linear infinite; }
.app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
.app-tag { font-size: 11px; color: #5C7086; }
.app-logo { width: 34px; height: 34px; border-radius: 50%; display: block; flex-shrink: 0; object-fit: cover; }
.divider-svg { width: 100%; height: 16px; display: block; margin-top: 4px; }

.tabs { display: flex; border-radius: 12px; padding: 4px; margin: 24px 0 16px; background: #131F30; border: 1px solid #26374E; }
.tab-btn { flex: 1; padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; background: transparent; color: #8CA0B8; }
.tab-btn.active { background: #4CC3F0; color: #062230; }

.section { display: flex; flex-direction: column; gap: 18px; }
.field-label { font-size: 12px; margin-bottom: 6px; display: block; color: #5C7086; }
.sub-label { font-size: 10px; color: #5C7086; margin: 2px 0 6px; }

.chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.chip-grid.two { grid-template-columns: repeat(2, 1fr); }
.chip-grid.four { grid-template-columns: repeat(4, 1fr); }
.chip-btn { padding: 10px 4px; border-radius: 8px; font-size: 12px; font-weight: 600; text-align: center; line-height: 1.2; cursor: pointer; background: #1B2C42; color: #EAF1F8; border: 1px solid #26374E; }
.chip-btn.active { background: #4CC3F0; color: #062230; border-color: #4CC3F0; }
.chip-btn.amber.active { background: #FF9645; color: #23140A; border-color: #FF9645; }

.select-wrap { position: relative; }
.select-input { width: 100%; appearance: none; -webkit-appearance: none; border-radius: 8px; padding: 10px 32px 10px 12px; font-size: 14px; background: #1B2C42; border: 1px solid #26374E; color: #EAF1F8; outline: none; }
.select-chevron { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }

.date-input, .text-input { width: 100%; border-radius: 8px; padding: 10px 12px; font-size: 14px; background: #1B2C42; border: 1px solid #26374E; color: #EAF1F8; outline: none; color-scheme: dark; }

.card { border-radius: 12px; padding: 14px; background: #131F30; border: 1px solid #26374E; }
.card.raised { background: #1B2C42; }

.tech-row-list { display: flex; flex-direction: column; gap: 10px; }

<body>
<div id="root"></div>

<script>
/* =========================================================
MICエアログ / プライベートチーム版。
記録はGoogleスプレッドシート(Apps Script Web App経由)に保存され、
同じアプリを開いている全員で共有されます。
========================================================= */

var COLORS = {
ice: "#4CC3F0",
amber: "#FF9645",
textFaint: "#5C7086",
};

/* ---- Googleスプレッドシート連携(Apps Script Web App) ---- */
var API_URL = "https://script.google.com/macros/s/AKfycbyH7nX_nhgJ4z7W_QCLGnZqwLp8GkCdRzof2RaaR3fLK2gKVpeF8P0lATS2uzzKJhP0ag/exec";

function apiGet() {
return fetch(API_URL).then(function (res) { return res.json(); });
}
function apiPost(payload) {
return fetch(API_URL, {
method: "POST",
headers: { "Content-Type": "text/plain;charset=utf-8" },
body: JSON.stringify(payload),
}).then(function (res) { return res.json(); });
}
function refreshData() {
return apiGet().then(function (data) {
ATHLETES = (data.athletes || []).map(function (a) { return { id: a.id, name: a.name }; });
DATA = data.records || [];
VIDEOS = data.videos || [];
recentAthleteIds = computeRecentAthleteIds();
if (!S.athlete && ATHLETES.length) { S.athlete = getOrderedAthletes()[0].id; }
});
}
/* サーバー確認済みの動画(VIDEOS)を行(rowId)単位で検索する。rowId/typeが記録されている
新形式の動画だけが対象で、rowIdが空の古い(v1時代の)動画はここには出てこない
(それらは entryId 単位で集約する videosForEntry() 経由でギャラリーカードにのみ表示する)。 */function manualRefresh() {
if (S.refreshing) return;
S.refreshing = true;
S.refreshError = "";
render();
refreshData().then(function () {
S.refreshing = false;
render();
}).catch(function (err) {
S.refreshing = false;
S.refreshError = "更新に失敗しました";
render();
});
}

function videosForRow(entryId, rowId, type) {
if (!rowId) return [];
return VIDEOS.filter(function (v) { return v.entryId === entryId && v.rowId === rowId && v.type === type; });
}
/* エントリ内の全動画(新形式・旧形式どちらも)を集約する。ギャラリーカード表示用。 */
function videosForEntry(entryId) {
return VIDEOS.filter(function (v) { return v.entryId === entryId; });
}

/* ---- 動画アップロード(Dropbox連携、Apps Script経由のチャンクアップロード) ----
記録時に選んだ動画は「保存後に送信」のローカルプレビューとして保持し、記録の保存(saveEntry)が
成功した後にバックグラウンドで順番にアップロードする。ダッシュボードから直接追加した動画は
選択直後にアップロードを開始する。どちらも同じキュー(videoQueue)・同じアップロード関数
(uploadVideoFile)・同じ保留中トラッカー(pendingVideos)を使う。 */
var VIDEO_CHUNK_SIZE = 4 * 1024 * 1024; // 4MB
var VIDEO_MAX_SIZE = 500 * 1024 * 1024; // 500MB

function videoListField(type) {
if (type === "single") return "videos";
if (type === "success") return "successVideos";
return "failVideos";
}
function videoCap(row, type) {
var raw = type === "single" ? row.reps : (type === "success" ? row.success : row.fail);
if (raw === "" || raw === undefined || raw === null) return Infinity;
return Math.max(0, Number(raw) || 0);
}
function videoCapLabel(count, cap) { return cap === Infinity ? (count + "本") : (count + "/" + cap); }
var videoItemCounter = 0;
function nextVideoItemId() { videoItemCounter++; return "vi" + videoItemCounter + "_" + Date.now().toString(36); }
function genRowId() { return "r" + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

/* ---- サーバーにまだ存在しない(アップロード中/待機中/エラー)動画のローカル追跡。
key は entryId+"|"+rowId+"|"+type。アップロードが完了しrefreshData()でVIDEOSに反映されたら
該当アイテムをここから取り除く。 */
var pendingVideos = {};
function pendingKey(entryId, rowId, type) { return entryId + "|" + rowId + "|" + type; }
function pendingListFor(entryId, rowId, type) { return pendingVideos[pendingKey(entryId, rowId, type)] || []; }
function addPendingItems(entryId, rowId, type, items) {
var key = pendingKey(entryId, rowId, type);
pendingVideos[key] = (pendingVideos[key] || []).concat(items);
}
function removePendingItem(entryId, rowId, type, itemId) {
var key = pendingKey(entryId, rowId, type);
if (!pendingVideos[key]) return;
pendingVideos[key] = pendingVideos[key].filter(function (v) { return v.id !== itemId; });
if (!pendingVideos[key].length) delete pendingVideos[key];
}

var videoQueue = [];
var videoQueueTotal = 0;
var videoQueueRunning = false;
function enqueueVideoUploads(items) {
if (!items || !items.length) return;
videoQueue = videoQueue.concat(items);
videoQueueTotal += items.length;
S.bgUpload = { total: videoQueueTotal, done: videoQueueTotal - videoQueue.length };
render();
if (!videoQueueRunning) runVideoQueue();
}
function runVideoQueue() {
if (!videoQueue.length) {
videoQueueRunning = false;
videoQueueTotal = 0;
S.bgUpload = null;
render();
return;
}
videoQueueRunning = true;
var item = videoQueue.shift();
runQueueItem(item, function () {
S.bgUpload = { total: videoQueueTotal, done: videoQueueTotal - videoQueue.length };
render();
runVideoQueue();
});
}
function runQueueItem(item, done) {
if (!item.file) { done(); return; }
item.status = "uploading";
item.progress = 0;
render();
uploadVideoFile(item.file, item.entryId, item.rowId, item.trickId, item.type, item.athleteId, function (pct) {
item.progress = pct;
render();
}).then(function () {
item.status = "done";
item.progress = 100;
item.file = null;
return refreshData();
}).then(function () {
removePendingItem(item.entryId, item.rowId, item.type, item.id);
render();
done();
}).catch(function (err) {
item.status = "error";
item.progress = 0;
render();
done();
});
}
function retryQueueItem(entryId, rowId, type, itemId) {
var list = pendingListFor(entryId, rowId, type);
var item = list.filter(function (v) { return v.id === itemId; })[0];
if (!item || !item.file) return;
enqueueVideoUploads([item]);
}

function readFileSlice(file, start, end) {
return new Promise(function (resolve, reject) {
var reader = new FileReader();
reader.onload = function () {
var result = String(reader.result || "");
resolve(result.split(",")[1] || "");
};
reader.onerror = function () { reject(reader.error); };
reader.readAsDataURL(file.slice(start, end));
});
}

function uploadVideoFile(file, entryId, rowId, trickId, type, athleteId, onProgress) {
var totalSize = file.size;
var sessionId = null;
var offset = 0;

function uploadNext(index) {
var start = index * VIDEO_CHUNK_SIZE;
var end = Math.min(start + VIDEO_CHUNK_SIZE, totalSize);
var isLast = end >= totalSize;
return readFileSlice(file, start, end).then(function (base64) {
if (isLast) {
return apiPost({
type: "videoUploadFinish",
sessionId: sessionId,
offset: offset,
chunkBase64: base64,
entryId: entryId,
rowId: rowId || "",
trickId: trickId,
videoType: type || "",
athleteId: athleteId || "",
athleteName: athleteName(athleteId) || "",
fileName: file.name || "video.mp4",
}).then(function (finishRes) {
if (!finishRes || finishRes.status !== "ok") throw new Error("upload finish failed");
if (onProgress) onProgress(100);
return finishRes;
});
}
return apiPost({
type: "videoUploadChunk",
sessionId: sessionId,
offset: offset,
chunkBase64: base64,
}).then(function (chunkRes) {
if (!chunkRes || chunkRes.status !== "ok") throw new Error("upload chunk failed");
offset += end - start;
if (onProgress) onProgress(Math.min(99, Math.round((offset / totalSize) * 100)));
return uploadNext(index + 1);
});
});
}

if (file.size > VIDEO_MAX_SIZE) {
return Promise.reject(new Error("動画サイズが大きすぎます(上限" + Math.round(VIDEO_MAX_SIZE / (1024 * 1024)) + "MB)。"));
}
return apiPost({ type: "videoUploadStart" }).then(function (startRes) {
if (!startRes || startRes.status !== "ok" || !startRes.sessionId) throw new Error("upload start failed");
sessionId = startRes.sessionId;
return uploadNext(0);
});
}

/* ---- 記録タブ:保存前のローカルプレビュー選択 ---- */
function handleVideoFileChange(idx, type, inputEl) {
var files = inputEl.files;
if (!files || !files.length) return;
var row = S.rows[idx];
var listField = videoListField(type);
if (!row[listField]) row[listField] = [];
var cap = videoCap(row, type);
for (var i = 0; i < files.length; i++) {
if (row[listField].length >= cap) break;
var file = files[i];
row[listField].push({ id: nextVideoItemId(), name: file.name, url: URL.createObjectURL(file), status: "pending", progress: 0, file: file });
}
inputEl.value = "";
render();
}
function removeVideoFile(idx, type, itemId) {
var row = S.rows[idx];
var listField = videoListField(type);
var list = row[listField] || [];
var item = list.filter(function (v) { return v.id === itemId; })[0];
if (item && item.url) { try { URL.revokeObjectURL(item.url); } catch (err) {} }
row[listField] = list.filter(function (v) { return v.id !== itemId; });
render();
}

/* ---- ダッシュボード:既存の記録に動画を追加(選択直後にアップロード開始) ----
rowIdx(そのentry.rows内でのインデックス)で対象行を特定する。行にまだrowIdが無い場合
(v1時代に作成された記録)は、動画を紐付けられるようupdateEntry_で新しいrowIdを1つだけ
書き戻してから(他の行のrowIdはそのまま)アップロードを開始する。 */
function dashVideoInputId(entryId, rowIdx, type) { return "dash-vid-" + entryId + "-" + rowIdx + "-" + type; }
function ensureRowId(entry, rowIdx) {
var row = entry.rows[rowIdx];
if (row.rowId) return Promise.resolve(row.rowId);
var newRowId = genRowId();
var rows = entry.rows.map(function (r, i) {
var out = { rowId: i === rowIdx ? newRowId : (r.rowId || undefined), trickId: r.trickId, trickLabel: trickLabel(r.trickId), modifier: r.modifier, nuki: !!r.nuki, unnatural: !!r.unnatural };
if (entry.category === "trampoline") { out.reps = r.reps; out.kakari = !!r.kakari; out.airtimeSeconds = r.airtimeSeconds; } else { out.success = r.success; out.fail = r.fail; }
return out;
});
return apiPost({ type: "updateEntry", entryId: entry.id, athlete: entry.athlete, athleteName: entry.athleteName, category: entry.category, date: entry.date, facility: entry.facility, kicker: entry.kicker, note: entry.note, rows: rows }).then(function (res) {
if (!res || res.status !== "ok") throw new Error("rowId backfill failed");
return refreshData();
}).then(function () { return newRowId; });
}
function handleDashVideoFileChange(entryId, rowIdx, type, inputEl) {
var files = inputEl.files;
if (!files || !files.length) return;
var entry = DATA.filter(function (e) { return e.id === entryId; })[0];
if (!entry || !entry.rows[rowIdx]) { inputEl.value = ""; return; }
var trickId = entry.rows[rowIdx].trickId;
var fileList = [];
for (var i = 0; i < files.length; i++) fileList.push(files[i]);
inputEl.value = "";
ensureRowId(entry, rowIdx).then(function (rowId) {
var freshEntry = DATA.filter(function (e) { return e.id === entryId; })[0] || entry;
var row = freshEntry.rows.filter(function (r) { return r.rowId === rowId; })[0] || freshEntry.rows[rowIdx];
var cap = videoCap(row, type);
var existingCount = videosForRow(entryId, rowId, type).length + pendingListFor(entryId, rowId, type).filter(function (v) { return v.status !== "error"; }).length;
var newItems = [];
fileList.forEach(function (file) {
if (existingCount + newItems.length >= cap) return;
newItems.push({ id: nextVideoItemId(), entryId: entryId, rowId: rowId, trickId: trickId, type: type, athleteId: entry.athlete, name: file.name, url: URL.createObjectURL(file), status: "pending", progress: 0, file: file });
});
if (newItems.length) { addPendingItems(entryId, rowId, type, newItems); render(); enqueueVideoUploads(newItems); }
else render();
}).catch(function () { render(); });
}

function openVideoModal(url, caption) { S.videoModalUrl = url; S.videoModalCaption = caption || ""; render(); }
function closeVideoModal() { S.videoModalUrl = null; S.videoModalCaption = ""; render(); }

/* 選手データはGoogleスプレッドシートから読み込む(初期状態は空、refreshData()で読み込まれる)。 */

function computeChartGeom(data, series, width, height, m) {
var n = data.length;
var plotW = width - m.left - m.right;
var plotH = height - m.top - m.bottom;
var values = [];
data.forEach(function (d) { series.forEach(function (s) { var v = d[s.key]; if (v !== null && v !== undefined && !Number.isNaN(v)) values.push(v); }); });
var maxV = values.length ? Math.max.apply(null, values) : 1;
var minV = values.length ? Math.min(0, Math.min.apply(null, values)) : 0;
var range = maxV - minV || 1;
function xAt(i) { return n <= 1 ? m.left + plotW / 2 : m.left + (i / (n - 1)) * plotW; }
function yAt(v) { return m.top + plotH - ((v - minV) / range) * plotH; }
return { xAt: xAt, yAt: yAt, maxV: maxV, minV: minV, n: n, plotW: plotW, plotH: plotH };
}
function renderChartHtml(id, data, series, height) {
var width = 400;
var m = { top: 10, bottom: 20, left: 30, right: 8 };
var geom = computeChartGeom(data, series, width, height, m);
var n = data.length;
var svg = '<svg viewBox="0 0 ' + width + " " + height + '" width="100%" height="' + height + '" preserveAspectRatio="none" style="display:block;overflow:visible;">';
svg += '<line x1="' + m.left + '" y1="' + (m.top + geom.plotH) + '" x2="' + (m.left + geom.plotW) + '" y2="' + (m.top + geom.plotH) + '" stroke="#26374E" stroke-width="1"/>';
svg += '<text x="' + (m.left - 4) + '" y="' + (geom.yAt(geom.maxV) + 3) + '" text-anchor="end" font-size="9" fill="' + COLORS.textFaint + '">' + Math.round(geom.maxV * 10) / 10 + "</text>";
svg += '<text x="' + (m.left - 4) + '" y="' + (geom.yAt(geom.minV) + 3) + '" text-anchor="end" font-size="9" fill="' + COLORS.textFaint + '">' + Math.round(geom.minV * 10) / 10 + "</text>";
var mid = Math.floor((n - 1) / 2);
data.forEach(function (pt, i) {
if (i !== 0 && i !== mid && i !== n - 1) return;
svg += '<text x="' + geom.xAt(i) + '" y="' + (height - 5) + '" text-anchor="middle" font-size="9" fill="' + COLORS.textFaint + '">' + escHtml(String(pt.date).slice(5)) + "</text>";
});
series.forEach(function (s) {
var d = "", started = false;
data.forEach(function (pt, i) {
var v = pt[s.key];
if (v === null || v === undefined || Number.isNaN(v)) { started = false; return; }
var x = geom.xAt(i), y = geom.yAt(v);
d += (started ? "L" : "M") + x.toFixed(1) + "," + y.toFixed(1) + " ";
started = true;
});
svg += '<path d="' + d.trim() + '" fill="none" stroke="' + s.color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
});
series.forEach(function (s) {
data.forEach(function (pt, i) {
var v = pt[s.key];
if (v === null || v === undefined || Number.isNaN(v)) return;
svg += '<circle cx="' + geom.xAt(i) + '" cy="' + geom.yAt(v) + '" r="3" fill="' + s.color + '" stroke="#0B1420" stroke-width="1.5"/>';
});
});
var slotW = geom.plotW / Math.max(n, 1);
data.forEach(function (pt, i) {
svg += '<rect class="hit" data-idx="' + i + '" x="' + (geom.xAt(i) - slotW / 2).toFixed(1) + '" y="' + m.top + '" width="' + slotW.toFixed(1) + '" height="' + geom.plotH + '" fill="transparent"/>';
});
svg += "</svg>";
pendingCharts.push({ id: id, data: data, series: series, geom: geom });
return '<div class="chart-wrap" id="' + id + '">' + svg + '<div class="chart-tooltip" style="display:none;"></div></div>';
}
function renderTrendChartHtml(id, data, height) {
var width = 400;
var m = { top: 18, bottom: 20, left: 28, right: 30 };
var plotW = width - m.left - m.right;
var plotH = height - m.top - m.bottom;
var n = data.length;
var counts = data.map(function (d) { return d.total; });
var maxCount = counts.length ? Math.max.apply(null, counts) : 0;
if (maxCount <= 0) maxCount = 1;
function xAt(i) { return n <= 1 ? m.left + plotW / 2 : m.left + (i / (n - 1)) * plotW; }
function yCount(v) { return m.top + plotH - (v / maxCount) * plotH; }
function yPct(v) { return m.top + plotH - (v / 100) * plotH; }
var slotW = plotW / Math.max(n, 1);
var barW = Math.max(10, Math.min(26, slotW * 0.5));
var r = Math.max(9, Math.min(13, height * 0.09));
var hasRate = data.some(function (d) { return d.rate !== null && d.rate !== undefined && !Number.isNaN(d.rate); });

var svg = '<svg viewBox="0 0 ' + width + " " + height + '" width="100%" height="' + height + '" preserveAspectRatio="none" style="display:block;overflow:visible;">';
svg += '<line x1="' + m.left + '" y1="' + (m.top + plotH) + '" x2="' + (m.left + plotW) + '" y2="' + (m.top + plotH) + '" stroke="#26374E" stroke-width="1"/>';

/* axis tick labels: left = 本数(count), right = 成功率(%) */
svg += '<text x="' + (m.left - 4) + '" y="' + (m.top + 3) + '" text-anchor="end" font-size="9" fill="' + COLORS.textFaint + '">' + maxCount + "</text>";
svg += '<text x="' + (m.left - 4) + '" y="' + (m.top + plotH + 3) + '" text-anchor="end" font-size="9" fill="' + COLORS.textFaint + '">0</text>';
if (hasRate) {
svg += '<text x="' + (m.left + plotW + 4) + '" y="' + (m.top + 3) + '" text-anchor="start" font-size="9" fill="' + COLORS.textFaint + '">100%</text>';
svg += '<text x="' + (m.left + plotW + 4) + '" y="' + (m.top + plotH + 3) + '" text-anchor="start" font-size="9" fill="' + COLORS.textFaint + '">0%</text>';
}

/* date labels: first / mid / last */
var mid = Math.floor((n - 1) / 2);
data.forEach(function (pt, i) {
if (i !== 0 && i !== mid && i !== n - 1) return;
svg += '<text x="' + xAt(i) + '" y="' + (height - 5) + '" text-anchor="middle" font-size="9" fill="' + COLORS.textFaint + '">' + escHtml(String(pt.date).slice(5)) + "</text>";
});

/* total bars (ice, left axis) + count labels */
var barsHtml = "", countLabelsHtml = "";
data.forEach(function (pt, i) {
var v = pt.total;

barsHtml += '<rect x="' + x.toFixed(1) + '" y="' + yTop.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + Math.max(h, 0).toFixed(1) + '" rx="3"/>';

countLabelsHtml += '<text x="' + xAt(i).toFixed(1) + '" y="' + ly.toFixed(1) + '" text-anchor="middle" dominant-baseline="central" font-size="10.5" font-weight="700" fill="' + (labelInside ? "#EAF1F8" : COLORS.textFaint) + '">' + v + "</text>";
});
svg += '<g fill="' + COLORS.ice + '" opacity="0.55">' + barsHtml + "</g>" + countLabelsHtml;

/* success-rate dashed line + circles (amber, right axis) */
var linePts = "", started = false;
data.forEach(function (pt, i) {
var v = pt.rate;
if (v === null || v === undefined || Number.isNaN(v)) { started = false; return; }
var x = xAt(i), y = yPct(v);
linePts += (started ? "L" : "M") + x.toFixed(1) + "," + y.toFixed(1) + " ";
started = true;
});
if (linePts) svg += '<path d="' + linePts.trim() + '" fill="none" stroke="' + COLORS.amber + '" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" stroke-linejoin="round"/>';
data.forEach(function (pt, i) {
var v = pt.rate;
if (v === null || v === undefined || Number.isNaN(v)) return;
var x = xAt(i), y = yPct(v);
svg += '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="' + r.toFixed(1) + '" fill="' + COLORS.amber + '" stroke="#0B1420" stroke-width="2"/>';
svg += '<text x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" text-anchor="middle" dominant-baseline="central" font-size="9.5" font-weight="700" fill="#23140A">' + v + "%</text>";
});

/* hover hit areas */
data.forEach(function (pt, i) {
svg += '<rect class="hit" data-idx="' + i + '" x="' + (xAt(i) - slotW / 2).toFixed(1) + '" y="' + m.top + '" width="' + slotW.toFixed(1) + '" height="' + plotH + '" fill="transparent"/>';
});
svg += "</svg>";

var legend =
'<div class="legend-row">' +

"</div>";

? [
{ key: "total", name: "本数", color: COLORS.ice, unit: "本" },
{ key: "rate", name: "成功率", color: COLORS.amber, unit: "%" },
]
: [{ key: "total", name: "本数", color: COLORS.ice, unit: "本" }];
pendingCharts.push({ id: id, data: data, series: chartSeries, geom: { xAt: xAt } });
return '<div class="chart-wrap" id="' + id + '">' + svg + '<div class="chart-tooltip" style="display:none;"></div></div>' + legend;
}

function saveEditEntry(category) {
var entry = DATA.filter(function (x) { return x.id === S.editingEntryId; })[0];
if (!entry) return;
var validRows;
if (category === "trampoline") {
validRows = S.editDraft.rows.filter(function (r) { if (r.trickId === "airtime") { return r.airtimeSeconds !== "" && r.airtimeSeconds !== undefined && Number(r.airtimeSeconds) >= 0; } return r.reps !== "" && r.reps !== undefined && Number(r.reps) >= 0; }).map(function (r) {
return { rowId: r.rowId || genRowId(), trickId: r.trickId, trickLabel: trickLabel(r.trickId), modifier: r.modifier, nuki: !!r.nuki, unnatural: !!r.unnatural, kakari: !!r.kakari, reps: r.trickId === "airtime" ? 10 : (Number(r.reps) || 0), airtimeSeconds: r.trickId === "airtime" ? (Number(r.airtimeSeconds) || 0) : '' };
});
} else {
validRows = S.editDraft.rows.filter(function (r) { return ((r.success !== "" && r.success !== undefined && Number(r.success) >= 0) || (r.fail !== "" && r.fail !== undefined && Number(r.fail) >= 0)); }).map(function (r) {
return { rowId: r.rowId || genRowId(), trickId: r.trickId, trickLabel: trickLabel(r.trickId), modifier: r.modifier, nuki: !!r.nuki, unnatural: !!r.unnatural, success: Number(r.success) || 0, fail: Number(r.fail) || 0 };
});
}
if (validRows.length === 0) return;
S.editSaving = true;
S.editError = "";
render();
var payload = {
type: "updateEntry",
entryId: entry.id,
athlete: entry.athlete,
athleteName: entry.athleteName || athleteName(entry.athlete),
category: category,
date: S.editDraft.date,
note: S.editDraft.note.trim(),
rows: validRows,
};
if (category === "water") { payload.facility = S.editDraft.facility; payload.kicker = S.editDraft.kicker; }
apiPost(payload).then(function (result) {
if (result.status !== "ok") { throw new Error(result.message || "更新に失敗しました"); }
return refreshData();
}).then(function () {
S.editingEntryId = null;
S.editDraft = null;
S.editSaving = false;
render();
}).catch(function (err) {
S.editSaving = false;
S.editError = "保存に失敗しました。通信状況を確認してもう一度お試しください。";
render();
});
}
function requestDeleteEntry(id) { S.confirmDeleteId = id; S.deleteError = ""; render(); }

function renderFeedbackCard() {
if (!S.feedbackOpen) { return ""; }
if (S.feedbackSent) {
return '<div class="card" style="margin-top:8px;border-color:' + COLORS.ice + ';display:flex;flex-direction:column;gap:8px;"><div style="font-size:13px;">送信しました。ありがとうございます！</div><button class="chip-btn" style="align-self:flex-start;" onclick="toggleFeedback()">閉じる</button></div>';
}
var busy = S.feedbackSending;
return (
'<div class="card" style="margin-top:8px;display:flex;flex-direction:column;gap:10px;">' +
'<div style="font-size:13px;font-weight:600;">フィードバックを送る</div>' +
'<div class="chip-grid">' +
'<button class="chip-btn ' + (S.feedbackType === "bug" ? "active" : "") + '" onclick="setFeedbackType(\'bug\')" ' + (busy ? "disabled" : "") + '>バグ報告</button>' +
'<button class="chip-btn ' + (S.feedbackType === "request" ? "active" : "") + '" onclick="setFeedbackType(\'request\')" ' + (busy ? "disabled" : "") + '>機能要望</button>' +
'<button class="chip-btn ' + (S.feedbackType === "other" ? "active" : "") + '" onclick="setFeedbackType(\'other\')" ' + (busy ? "disabled" : "") + '>その他</button>' +
"</div>" +
'<textarea class="note-textarea" rows="3" placeholder="内容を入力してください" oninput="setFeedbackContent(this.value)" ' + (busy ? "disabled" : "") + '>' + escHtml(S.feedbackContent) + "</textarea>" +
'<input class="text-input" type="text" placeholder="お名前(任意)" value="' + escAttr(S.feedbackName) + '" oninput="setFeedbackName(this.value)" ' + (busy ? "disabled" : "") + '>' +
'<div class="inline-row">' +
'<button class="save-btn" style="flex:1;" onclick="sendFeedback()" ' + (busy ? "disabled" : "") + '>' + (busy ? "送信中…" : "送信する") + '</button>' +
'<button class="chip-btn" style="flex:0 0 auto;padding:12px 14px;" onclick="toggleFeedback()" ' + (busy ? "disabled" : "") + '>キャンセル</button>' +
"</div>" +
(S.feedbackError ? '<div style="color:' + COLORS.amber + ';font-size:12px;">' + escHtml(S.feedbackError) + "</div>" : "") +
"</div>"
);
}
function renderTabs() {
return (
'<div class="tabs">' +
'<button class="tab-btn ' + (S.tab === "record" ? "active" : "") + '" onclick="selectTab(\'record\')">記録する</button>' +
'<button class="tab-btn ' + (S.tab === "dashboard" ? "active" : "") + '" onclick="selectTab(\'dashboard\')">ダッシュボード</button>' +
"</div>"
);
}
function renderVideoModal() {
var open = !!S.videoModalUrl;
return (
'<div class="video-modal-overlay' + (open ? " open" : "") + '" onclick="closeVideoModal()">' +
'<div class="video-modal-box" onclick="event.stopPropagation()">' +
(open ? '<video src="' + S.videoModalUrl + '" controls autoplay playsinline></video>' : "") +
(S.videoModalCaption ? '<div class="video-modal-caption">' + escHtml(S.videoModalCaption) + "</div>" : "") +
'<button class="video-modal-close" onclick="closeVideoModal()">閉じる</button>' +
"</div></div>"
);
}
function render() {
pendingCharts = [];
var root = document.getElementById("root");
root.innerHTML =
'<div class="app-shell"><div class="container">' +
renderHeader() +
renderTabs() +
(S.tab === "record" ? renderRecordTab() : renderDashboardTab()) +
"</div></div>" +
renderVideoModal();
wireCharts();
}
function renderLoading() {
var root = document.getElementById("root");
root.innerHTML =
'<div class="app-shell"><div class="container">' +
renderHeader() +
'<div class="section" style="text-align:center;padding:40px 12px;color:' + COLORS.textFaint + ';">読み込み中…</div>' +
"</div></div>";
}
function loadAll() {
S.loading = true;
renderLoading();
refreshData().then(function () {
S.loading = false;
S.loadError = "";
render();
}).catch(function (err) {
S.loading = false;
S.loadError = "データの読み込みに失敗しました。通信状況を確認して、画面を再読み込みしてください。";
render();
});
}

document.addEventListener("visibilitychange", function () { if (document.visibilityState === "visible") maybeResetDateToToday(); });
window.addEventListener("pageshow", function () { maybeResetDateToToday(); });
loadAll();
</script>
</body>
</html>
